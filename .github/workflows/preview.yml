name: Preview

# Render atlas preview images of the current code on every change, so a diff's
# macro shape is visible at a glance. Download them from the run's artifacts.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Cache the downloaded browser binaries (~150MB) keyed on the Playwright
      # version, so reruns skip the download. OS-level deps aren't cached, so on
      # a hit we still run install-deps (cheap; most are preinstalled on the runner).
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(pnpm exec playwright --version | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
      - run: pnpm build
      # boots the CLI server on this repo (live analysis) and screenshots the atlas
      - run: pnpm exec tsx e2e/capturePreview.mts
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: atlas-preview
          path: preview/
          if-no-files-found: error
