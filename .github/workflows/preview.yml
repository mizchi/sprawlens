name: Preview

# Render atlas preview images of the current code on every change, so a diff's
# macro shape is visible at a glance. Download them from the run's artifacts.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      # boots the CLI server on this repo (live analysis) and screenshots the atlas
      - run: pnpm exec tsx e2e/capturePreview.mts
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: atlas-preview
          path: preview/
          if-no-files-found: error
