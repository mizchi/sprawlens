name: publish

# Fires when release-please publishes a GitHub Release (one per package, tag
# format "<package-name>-v<version>"). Publishes that single package to npm via
# OIDC Trusted Publishing — no NPM_TOKEN.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC Trusted Publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # the published @sprawlens/cli is a bundle of viz + the workspace; build it
      # (and viz) before packing. The sprawlens wrapper ships only bin.js, but
      # building everything is harmless.
      - run: pnpm build

      # release-please tags are "<package-name>-v<version>"; map the package name
      # back to its workspace directory.
      - name: Resolve package directory from the release tag
        id: pkg
        run: |
          NAME="${GITHUB_REF_NAME%-v*}"
          DIR=$(node -e "const fs=require('fs');for(const d of fs.readdirSync('packages')){const f='packages/'+d+'/package.json';if(fs.existsSync(f)&&JSON.parse(fs.readFileSync(f)).name===process.argv[1]){console.log('packages/'+d);break}}" "$NAME")
          if [ -z "$DIR" ]; then echo "no package matched tag $GITHUB_REF_NAME"; exit 1; fi
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "publishing $NAME from $DIR"

      # pnpm publish replaces the wrapper's `workspace:*` with the real version
      # at pack time (npm publish would ship the literal protocol). --provenance
      # + OIDC need no token.
      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: pnpm publish --provenance --no-git-checks --access public
